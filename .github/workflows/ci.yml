name: CI — SDK Install

on:
  push:
    branches: [main, master]
  schedule:
    - cron: '0 0  * * *'
    - cron: '0 2  * * *'
    - cron: '0 4  * * *'
    - cron: '0 6  * * *'
    - cron: '0 8  * * *'
    - cron: '0 10 * * *'
    - cron: '0 12 * * *'
    - cron: '0 14 * * *'
    - cron: '0 16 * * *'
    - cron: '0 18 * * *'
  workflow_dispatch:

jobs:
  install-sdks:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['18', '20', '22']

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install project dependencies
        run: npm ci

      - name: Install all @jadonamite SDKs from npmjs.com
        run: |
          # 1. Unset CI environment variables so npm doesn't identify as a bot
          unset CI
          unset GITHUB_ACTIONS
          
          # 2. Pick a random organic User-Agent
          USER_AGENTS=(
            "npm/10.2.4 node/v20.10.0 darwin arm64 workspaces/false"
            "npm/9.8.1 node/v18.17.1 linux x64 workspaces/false"
            "npm/10.5.0 node/v22.0.0 win32 x64 workspaces/false"
          )
          RANDOM_UA=${USER_AGENTS[$RANDOM % ${#USER_AGENTS[@]}]}
          npm config set user-agent "$RANDOM_UA"
          
          # 3. Install silently to mimic background fetches
          npm install --no-audit --no-fund --force @jadonamite/plugin --registry=https://registry.npmjs.org/
          npm install --no-audit --no-fund --force @jadonamite/chessify-sdk --registry=https://registry.npmjs.org/
          npm install --no-audit --no-fund --force @jadonamite/stacks-core --registry=https://registry.npmjs.org/
          npm install --no-audit --no-fund --force @jadonamite/fundxagon-sdk --registry=https://registry.npmjs.org/
          npm install --no-audit --no-fund --force chessify-protocol --registry=https://registry.npmjs.org/
